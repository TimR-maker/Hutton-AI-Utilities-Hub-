<style>
:root{--navy:#071426;--navy2:#12315f;--line:#d8e2ee;--ink:#132033;--muted:#607089;--green:#17633a}

html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#eef3f8;color:var(--ink)}

.btn:hover{background:var(--navy2);border-color:var(--navy2);color:#fff}.btn.primary{background:var(--green);border-color:#4ade80;color:#fff}.btn.primary:hover{background:#0f7a42}
