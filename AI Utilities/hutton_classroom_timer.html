<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hutton Grammar School Classroom Animal Timer</title>
<link rel="icon" type="image/svg+xml" href="hutton_ai_hub_icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== SETUP SCREEN ===== */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  #setup h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 0.3rem;
    background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  #setup p.sub {
    color: #aaa;
    margin-bottom: 2rem;
    font-size: 1.1rem;
    text-align: center;
  }

  .setup-card {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .field-label {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffd200;
    margin-bottom: 0.6rem;
  }

  /* Mode toggle */
  .mode-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .mode-btn {
    padding: 0.8rem;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #ccc;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .mode-btn.active {
    background: #ffd200;
    border-color: #ffd200;
    color: #1a1a2e;
  }

  /* Time presets */
  .time-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .preset-btn {
    padding: 0.5rem 1rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #ddd;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover, .preset-btn.active {
    background: #e94560;
    border-color: #e94560;
    color: #fff;
  }

  .custom-time-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 0.5rem;
  }

  .custom-time-row input {
    width: 70px;
    padding: 0.5rem 0.7rem;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
  }

  .custom-time-row span {
    color: #aaa;
    font-size: 0.9rem;
  }

  /* Animal grid */
  .animal-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .animal-btn {
    padding: 0.6rem 1rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #ddd;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .animal-btn span.name {
    font-size: 0.8rem;
    font-weight: 700;
    color: #aaa;
  }

  .animal-btn:hover, .animal-btn.active {
    background: #533483;
    border-color: #a855f7;
    color: #fff;
  }

  .animal-btn.active span.name { color: #ddd; }

  /* Start button */
  .start-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 0.5rem;
  }

  .btn-start {
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,210,0,0.3);
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,210,0,0.4); }

  .btn-fullscreen {
    padding: 1rem;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #ccc;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-fullscreen:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* ===== TIMER SCREEN ===== */
  #timer {
    display: none;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  #timer-bg {
    position: absolute;
    inset: 0;
    transition: background 1s ease;
  }

  /* Sky + ground */
  .sky { background: linear-gradient(180deg, #0d47a1 0%, #1565c0 60%, #1e88e5 100%); }
  .sky-amber { background: linear-gradient(180deg, #e65100 0%, #f57c00 60%, #ffa726 100%); }
  .sky-red { background: linear-gradient(180deg, #b71c1c 0%, #c62828 60%, #e53935 100%); }

  #ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 22%;
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  }

  .ground-green { background: linear-gradient(180deg, #388e3c 0%, #2e7d32 100%); }
  .ground-amber { background: linear-gradient(180deg, #f57f17 0%, #e65100 100%); }
  .ground-red { background: linear-gradient(180deg, #b71c1c 0%, #7f0000 100%); }

  /* Stars / clouds decoration */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.15);
    border-radius: 50px;
  }

  /* Progress track */
  #track-container {
    position: absolute;
    bottom: 22%;
    left: 0;
    right: 0;
    height: 12px;
    padding: 0 60px;
  }

  #track-bg {
    height: 100%;
    background: rgba(0,0,0,0.25);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }

  #track-fill {
    height: 100%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    border-radius: 6px;
    width: 0%;
    transition: background 1s ease;
  }

  /* Animal */
  #animal-wrap {
    position: absolute;
    bottom: calc(22% + 10px);
    transition: left 0.3s linear;
    transform: translateX(-50%) scaleX(-1);
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
  }

  #animal-svg {
    width: 160px;
    height: 160px;
    display: block;
  }

  /* Grass blades */
  #grass-row {
    position: absolute;
    bottom: 22%;
    left: 0;
    right: 0;
    height: 30px;
    pointer-events: none;
  }

  /* Big timer display */
  #display-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    pointer-events: none;
  }

  #mode-label {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 0.5rem;
  }

  #time-display {
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    transition: color 1s ease;
    color: #fff;
  }

  #animal-name-display {
    font-size: clamp(1rem, 2.5vw, 1.8rem);
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-top: 0.5rem;
    letter-spacing: 1px;
  }

  /* Controls bar */
  #controls {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  .ctrl-btn {
    padding: 0.7rem 1.5rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.15); }

  .ctrl-btn.primary {
    background: #ffd200;
    color: #1a1a2e;
    border-color: #ffd200;
  }

  .ctrl-btn.primary:hover { background: #ffe033; }

  /* Finish banner */
  #finish-banner {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 20;
    flex-direction: column;
    gap: 1.5rem;
  }

  #finish-banner .finish-text {
    font-size: clamp(3rem, 12vw, 8rem);
    font-weight: 900;
    text-align: center;
    animation: bounce 0.5s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: scale(0.96); }
    to   { transform: scale(1.04); }
  }

  @keyframes walk {
    0%   { transform: rotate(-2deg); }
    50%  { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
  }

  @keyframes walkLegs {
    0%, 100% { transform: none; }
    50% { transform: scaleY(-1) translateY(-4px); }
  }

  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .flashing { animation: flash 0.4s ease infinite; }

  /* Leg bob animation applied via JS */
  .walking #animal-svg { animation: walk 0.5s ease-in-out infinite; }

  /* Sun/Moon decorations */
  #sun {
    position: absolute;
    top: 10%;
    right: 10%;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd200, #f7971e);
    box-shadow: 0 0 40px rgba(255,210,0,0.5);
    transition: background 1s;
  }

  .hutton-school-badge {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 82px;
    height: auto;
    z-index: 4;
    background: #fff;
    border-radius: 6px;
    padding: 4px;
  }

  .utility-copyright {
    margin-top: 18px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,.18);
    color: #aeb8c8;
    font-size: 11px;
    line-height: 1.45;
    text-align: center;
  }

  .hutton-floating-nav {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .hutton-floating-nav a,
  .hutton-floating-nav button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 132px;
    padding: 10px 13px;
    border-radius: 999px;
    border: 1px solid #cbd9eb;
    text-decoration: none;
    font: 700 14px Arial, sans-serif;
    background: #0b2348;
    color: #fff;
    cursor: pointer;
  }

  .hutton-floating-nav button { background: #e6eef8; color: #0b2348; }
  body.timer-running .hutton-floating-nav { display: none; }
  #setup { height: 100vh; overflow-y: auto; }

  @media (max-width: 720px) {
    .hutton-school-badge { width: 58px; top: 12px; right: 12px; }
    .hutton-floating-nav { right: 10px; bottom: 10px; }
    #setup h1 { padding: 0 58px; }
  }

  @media print {
    .hutton-floating-nav { display: none !important; }
  }
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="setup">
  <img class="hutton-school-badge" src="hutton_school_badge.png" alt="Hutton Grammar School badge">
  <h1>&#127358; Animal Timer</h1>
  <p class="sub">The classroom countdown that walks on four legs</p>

  <div class="setup-card">
    <!-- Mode -->
    <div>
      <div class="field-label">&#9200; Mode</div>
      <div class="mode-row">
        <button class="mode-btn active" id="btn-countdown" onclick="setMode('countdown')">&#9660; Countdown</button>
        <button class="mode-btn" id="btn-stopwatch" onclick="setMode('stopwatch')">&#9650; Stopwatch</button>
      </div>
    </div>

    <!-- Time (countdown only) -->
    <div id="time-section">
      <div class="field-label">&#8987; Duration</div>
      <div class="time-presets">
        <button class="preset-btn" onclick="setPreset(60)">1 min</button>
        <button class="preset-btn" onclick="setPreset(120)">2 min</button>
        <button class="preset-btn active" onclick="setPreset(300)">5 min</button>
        <button class="preset-btn" onclick="setPreset(600)">10 min</button>
        <button class="preset-btn" onclick="setPreset(900)">15 min</button>
        <button class="preset-btn" onclick="setPreset(1800)">30 min</button>
      </div>
      <div class="custom-time-row">
        <input type="number" id="custom-min" placeholder="0" min="0" max="99" value="" oninput="setCustom()"> <span>min</span>
        <input type="number" id="custom-sec" placeholder="0" min="0" max="59" value="" oninput="setCustom()"> <span>sec</span>
        <span style="color:#666; font-size:0.8rem; margin-left:4px">custom</span>
      </div>
    </div>

    <!-- Animal -->
    <div>
      <div class="field-label">&#127423; Choose your animal</div>
      <div class="animal-grid" id="animal-grid"></div>
    </div>

    <!-- Start -->
    <div class="start-row">
      <button class="btn-start" onclick="startTimer()">&#9654; START!</button>
      <button class="btn-fullscreen" onclick="startFullscreen()">&#x26F6; Fullscreen Start</button>
    </div>
  </div>
  <footer class="utility-copyright">&copy; T J Roberts 2026. All rights reserved.<br>Licensed to Hutton Grammar School for internal educational use only.</footer>
</div>

<!-- ===== TIMER SCREEN ===== -->
<div id="timer">
  <div id="timer-bg" class="sky"></div>
  <div id="sun"></div>

  <!-- Clouds -->
  <div class="cloud" style="width:140px;height:45px;top:12%;left:8%;"></div>
  <div class="cloud" style="width:90px;height:32px;top:18%;left:30%;"></div>
  <div class="cloud" style="width:120px;height:38px;top:8%;right:22%;"></div>

  <div id="ground" class="ground-green"></div>
  <div id="grass-row"></div>

  <!-- Track -->
  <div id="track-container">
    <div id="track-bg"><div id="track-fill"></div></div>
  </div>

  <!-- Animal -->
  <div id="animal-wrap" class="walking">
    <svg id="animal-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Display -->
  <div id="display-wrap">
    <div id="mode-label">COUNTDOWN</div>
    <div id="time-display">05:00</div>
    <div id="animal-name-display"></div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="ctrl-btn primary" id="btn-pause" onclick="togglePause()">&#9646;&#9646; Pause</button>
    <button class="ctrl-btn" onclick="resetTimer()">&#8635; Reset</button>
    <button class="ctrl-btn" onclick="backToSetup()">&#9881; Settings</button>
    <button class="ctrl-btn" onclick="toggleFS()">&#x26F6; Fullscreen</button>
  </div>

  <!-- Finish -->
  <div id="finish-banner">
    <div class="finish-text" id="finish-text">&#9203; Time's Up!</div>
    <button class="ctrl-btn primary" style="font-size:1.3rem;padding:1rem 2.5rem" onclick="resetTimer()">&#9654; Again!</button>
    <button class="ctrl-btn" style="font-size:1.1rem" onclick="backToSetup()">&#9881; Settings</button>
  </div>
</div>

<div class="hutton-floating-nav">
  <a href="Hutton_AI_Utilities_Hub.html"><span aria-hidden="true">&#127968;</span>&nbsp; Utilities Hub</a>
  <button type="button" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span aria-hidden="true">&uarr;</span>&nbsp; Top</button>
</div>

<script>
// ===== ANIMALS =====
const ANIMALS = [
  { id: 'random', label: '&#127922; Random', name: 'Random Animal', draw: null },
  { id: 'lion',   label: '&#129409; Lion',   name: 'Leo the Lion',    draw: drawLion   },
  { id: 'shark',  label: '&#129416; Shark',  name: 'Finn the Shark',  draw: drawShark  },
  { id: 'dino',   label: '&#129430; Dino',   name: 'Rex the Dino',    draw: drawDino   },
  { id: 'croc',   label: '&#129426; Croc',   name: 'Snappy the Croc', draw: drawCroc   },
  { id: 'fox',    label: '&#129418; Fox',    name: 'Flash the Fox',   draw: drawFox    },
  { id: 'frog',   label: '&#129408; Frog',   name: 'Hopscotch',       draw: drawFrog   },
  { id: 'rocket', label: '&#128640; Rocket', name: 'The Rocket',      draw: drawRocket },
];

const REAL_ANIMALS = ANIMALS.filter(a => a.id !== 'random');

// ===== STATE =====
let mode = 'countdown';
let totalSecs = 300;
let elapsed = 0;
let running = false;
let paused = false;
let interval = null;
let chosenAnimal = null;
let selectedAnimalId = 'random';
let activePreset = 300;

// ===== SETUP INIT =====
const grid = document.getElementById('animal-grid');
ANIMALS.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'animal-btn' + (a.id === 'random' ? ' active' : '');
  btn.id = 'abtn-' + a.id;
  btn.innerHTML = a.label + '<span class="name">' + (a.id === 'random' ? '' : a.name.split(' ')[0]) + '</span>';
  btn.onclick = () => selectAnimal(a.id);
  grid.appendChild(btn);
});

function setMode(m) {
  mode = m;
  document.getElementById('btn-countdown').classList.toggle('active', m === 'countdown');
  document.getElementById('btn-stopwatch').classList.toggle('active', m === 'stopwatch');
  document.getElementById('time-section').style.display = m === 'countdown' ? '' : 'none';
}

function setPreset(s) {
  activePreset = s; totalSecs = s;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('custom-min').value = '';
  document.getElementById('custom-sec').value = '';
  event.target.classList.add('active');
}

function setCustom() {
  const m = parseInt(document.getElementById('custom-min').value) || 0;
  const s = parseInt(document.getElementById('custom-sec').value) || 0;
  const total = m * 60 + s;
  if (total > 0) {
    totalSecs = total;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    activePreset = null;
  }
}

function selectAnimal(id) {
  selectedAnimalId = id;
  document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('abtn-' + id).classList.add('active');
}

// ===== DRAWING ANIMALS =====
function setAnimalSVG() {
  let a;
  if (selectedAnimalId === 'random') {
    a = REAL_ANIMALS[Math.floor(Math.random() * REAL_ANIMALS.length)];
  } else {
    a = ANIMALS.find(x => x.id === selectedAnimalId);
  }
  chosenAnimal = a;
  const svg = document.getElementById('animal-svg');
  svg.innerHTML = a.draw();
  document.getElementById('animal-name-display').textContent = a.name;
}

function drawLion() {
  return `
    <!-- body -->
    <ellipse cx="100" cy="135" rx="52" ry="32" fill="#e6a020"/>
    <!-- legs -->
    <rect x="62" y="155" width="16" height="28" rx="7" fill="#c87d10"/>
    <rect x="82" y="158" width="14" height="25" rx="6" fill="#c87d10"/>
    <rect x="104" y="158" width="14" height="25" rx="6" fill="#c87d10"/>
    <rect x="122" y="155" width="16" height="28" rx="7" fill="#c87d10"/>
    <!-- tail -->
    <path d="M152 130 Q175 110 165 90 Q158 75 170 65" stroke="#e6a020" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="170" cy="62" r="10" fill="#b05000"/>
    <!-- mane -->
    <circle cx="90" cy="95" r="42" fill="#b05000"/>
    <!-- head -->
    <circle cx="90" cy="93" r="34" fill="#f0b030"/>
    <!-- eyes -->
    <circle cx="79" cy="87" r="7" fill="#fff"/>
    <circle cx="101" cy="87" r="7" fill="#fff"/>
    <circle cx="81" cy="87" r="4" fill="#1a1a00"/>
    <circle cx="103" cy="87" r="4" fill="#1a1a00"/>
    <circle cx="82" cy="86" r="1.5" fill="#fff"/>
    <circle cx="104" cy="86" r="1.5" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="90" cy="98" rx="8" ry="6" fill="#e08060"/>
    <path d="M90 104 Q82 110 80 114" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M90 104 Q98 110 100 114" stroke="#333" stroke-width="2" fill="none"/>
    <!-- whiskers -->
    <line x1="65" y1="97" x2="82" y2="99" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <line x1="65" y1="102" x2="82" y2="101" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <line x1="98" y1="99" x2="115" y2="97" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <line x1="98" y1="101" x2="115" y2="102" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <!-- ears -->
    <polygon points="70,62 58,42 82,55" fill="#f0b030"/>
    <polygon points="110,62 122,42 98,55" fill="#f0b030"/>
    <polygon points="70,62 62,50 78,56" fill="#e08060"/>
    <polygon points="110,62 118,50 102,56" fill="#e08060"/>
  `;
}

function drawShark() {
  return `

// ===== TIMER LOGIC =====
function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return pad(h) + ':' + pad(m) + ':' + pad(sec);
  return pad(m) + ':' + pad(sec);
}
function pad(n) { return String(n).padStart(2, '0'); }

function getRemaining() {
  if (mode === 'countdown') return Math.max(0, totalSecs - elapsed);
  return elapsed;
}

function getProgress() {
  if (mode === 'countdown') return totalSecs > 0 ? elapsed / totalSecs : 0;
  return Math.min(1, elapsed / 60); // stopwatch: 1 min = full track
}

function updateDisplay() {
  const rem = getRemaining();
  document.getElementById('time-display').textContent = fmtTime(rem);

  const prog = Math.min(1, getProgress());
  document.getElementById('track-fill').style.width = (prog * 100) + '%';

  // Animal position: 5% to 92%
  const pct = 5 + prog * 87;
  document.getElementById('animal-wrap').style.left = pct + '%';

  // Color urgency for countdown
  let skyClass = 'sky', groundClass = 'ground-green', trackColor = '#4caf50, #8bc34a', timeColor = '#fff', sunColor = '';
  if (mode === 'countdown') {
    if (prog > 0.66 && prog < 1) {
      skyClass = 'sky-amber'; groundClass = 'ground-amber';
      trackColor = '#ff9800, #ffc107'; timeColor = '#ffd200';
    }
    if (prog >= 1) {
      skyClass = 'sky-red'; groundClass = 'ground-red';
      trackColor = '#e53935, #ff5722'; timeColor = '#ff6b6b';
    }
  }

  const bg = document.getElementById('timer-bg');
  bg.className = skyClass;
  const grd = document.getElementById('ground');
  grd.className = 'ground-' + (groundClass.split('-')[1]);
  grd.className = groundClass;
  document.getElementById('track-fill').style.background = 'linear-gradient(90deg,' + trackColor + ')';
  document.getElementById('time-display').style.color = timeColor;

  // Done?
  if (mode === 'countdown' && rem === 0 && running) {
    clearInterval(interval);
    running = false;
    document.getElementById('finish-banner').style.display = 'flex';
    document.getElementById('finish-text').innerHTML = chosenAnimal.name.split(' ')[0] + ' made it! &#127881;';
    document.getElementById('time-display').classList.add('flashing');
    try { const a = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA...'); } catch(e){}
  }
}

function startTimer() {
  document.body.classList.add('timer-running');
  setAnimalSVG();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('timer').style.display = 'flex';
  document.getElementById('mode-label').textContent = mode === 'countdown' ? 'COUNTDOWN' : 'STOPWATCH';

  elapsed = 0;
  running = true;
  paused = false;
  document.getElementById('finish-banner').style.display = 'none';
  document.getElementById('time-display').classList.remove('flashing');
  document.getElementById('btn-pause').textContent = '⏸ Pause';

  updateDisplay();
  interval = setInterval(() => {
    if (!paused) {
      elapsed++;
      updateDisplay();
    }
  }, 1000);
}

function startFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  startTimer();
}

function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').innerHTML = paused ? '&#9654; Resume' : '&#9646;&#9646; Pause';
  document.getElementById('animal-wrap').classList.toggle('walking', !paused);
}

function resetTimer() {
  clearInterval(interval);
  elapsed = 0;
  running = false;
  paused = false;
  document.getElementById('finish-banner').style.display = 'none';
  document.getElementById('time-display').classList.remove('flashing');
  document.getElementById('animal-wrap').classList.add('walking');
  document.getElementById('btn-pause').innerHTML = '&#9646;&#9646; Pause';
  startTimerInner();
}

function startTimerInner() {
  elapsed = 0;
  running = true;
  paused = false;
  updateDisplay();
  clearInterval(interval);
  interval = setInterval(() => {
    if (!paused) { elapsed++; updateDisplay(); }
  }, 1000);
}

function backToSetup() {
  clearInterval(interval);
  running = false;
  document.body.classList.remove('timer-running');
  document.getElementById('timer').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

// Initial setup state
setMode('countdown');
